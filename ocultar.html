<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Estilos generales de la página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #09df50, #0f0701); /* Fondo con degradado */
            text-align: center;
            padding: 50px;
            color: white;
        }
        
        /* Estilos del título */
        h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        /* Estilos del párrafo con id "mensaje" */
        #mensaje {
            font-size: 1.5em;
            margin: 20px 0;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        
        /* Estilos del botón */
        button {
            background-color: #10110f; /* Color de fondo verde */
            color: rgb(240, 8, 8);
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border: none;
            border-radius: 12px; /* Bordes redondeados */
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        
        /* Cambio de estilo cuando el mouse está sobre el botón */
        button:hover {
            background-color: #2432f0;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h2>¿Qué puede hacer JavaScript?</h2>

    <p id="mensaje">JavaScript puede ocultar elementos HTML.</p>

    <!-- Botón que oculta el párrafo al hacer clic -->
    <button type="button" onclick="ocultarElemento()">OCULTAR</button>
    <button type="button" onclick="mostrarElemento()">MOSTRAR</button>
    <script>
        function ocultarElemento() {
            var elemento = document.getElementById('mensaje');
            elemento.style.opacity = '0';
            elemento.style.transform = 'scale(0.5)';
            setTimeout(function() {
                elemento.style.display = 'none';
            }, 500);
        }
        function mostrarElemento(){
             var elemento = document.getElementById('mensaje');
            elemento.style.opacity = '10';
            elemento.style.transform = 'scale(1)';
            setTimeout(function() {
                elemento.style.display = 'block';
            }, 500);

        }
    </script>

</body>
</html>
